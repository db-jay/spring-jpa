spring:
  application:
    name: data-jpa
  datasource:
    # 앱 실행, 테스트, H2 콘솔에서 같은 DB를 보려면 TCP 서버 모드로 맞춘다.
    # 홈 디렉터리의 ~/datajpa 대신 프로젝트 전용 파일을 써서 다른 H2 실습과 충돌을 피한다.
    # 먼저 H2 TCP 서버가 켜져 있어야 한다.
    url: jdbc:h2:tcp://localhost:9092/~/git/spring-jpa/h2db/datajpa
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      # 브라우저에서 H2 콘솔을 열 때 사용하는 경로
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      # 실행 시점마다 테이블을 다시 만든다. 학습에는 편하지만 운영에서는 주의해야 한다.
      ddl-auto: create
    properties:
      hibernate:
        # show_sql: true
        # SQL 줄바꿈 정렬용 옵션
        format_sql: true

logging:
  level:
    root: warn
    # 지금은 "실제로 어떤 SQL이 나가는지"에 집중한다.
    # 그래서 트랜잭션/영속성 컨텍스트 내부 디버그 로그는 줄이고,
    # Hibernate가 실행하는 SQL만 보이도록 최소 설정으로 맞춘다.
    org.springframework.orm.jpa: warn
    org.springframework.test.context.transaction: warn
    org.hibernate.SQL: debug
    # 바인딩 값까지 보고 싶을 때만 아래 주석을 잠깐 해제한다.
    # org.hibernate.orm.jdbc.bind: trace
