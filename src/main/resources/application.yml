spring:
  application:
    name: data-jpa
  datasource:
    # 학습용 실행 DB 설정
    url: jdbc:h2:~/datajpa
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      # 브라우저에서 H2 콘솔을 열 때 사용하는 경로
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      # 실행 시점마다 테이블을 다시 만든다. 학습에는 편하지만 운영에서는 주의해야 한다.
      ddl-auto: create
    properties:
      hibernate:
        # show_sql: true
        # SQL 줄바꿈 정렬용 옵션
        format_sql: true

logging:
  level:
    # JPA 동작 흐름과 SQL 로그를 눈으로 따라가기 위한 학습용 로그 설정
    org.springframework.orm.jpa: debug
    org.springframework.test.context.transaction: trace
#    org.springframework.transaction.interceptor: trace
#    org.hibernate.SQL: debug
#    org.hibernate.orm.jdbc.bind: trace
    org.hibernate.type: trace
