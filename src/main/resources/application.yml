spring:
  application:
    name: data-jpa
  datasource:
    # TCP 서버(jdbc:h2:tcp://...)를 쓰면 먼저 9092 포트의 H2 서버를 따로 띄워야 한다.
    # 로컬 학습용 실행은 외부 H2 서버 의존성을 없애기 위해 파일 모드로 둔다.
    # 이렇게 하면 DataJpaApplication만 실행해도 같은 프로젝트 폴더의 DB 파일을 바로 사용한다.
    # AUTO_SERVER=TRUE 를 주면 같은 파일 DB를 H2 콘솔/별도 프로세스가 함께 열 때
    # 파일 lock 충돌을 줄일 수 있어 로컬 학습에 더 편하다.
    url: jdbc:h2:file:./h2db/datajpa;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      # 브라우저에서 H2 콘솔을 열 때 사용하는 경로
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      # 실행 시점마다 테이블을 다시 만든다. 학습에는 편하지만 운영에서는 주의해야 한다.
      ddl-auto: create
    properties:
      hibernate:
        # show_sql: true
        # SQL 줄바꿈 정렬용 옵션
        format_sql: true

logging:
  level:
    root: warn
    # 지금은 "실제로 어떤 SQL이 나가는지"에 집중한다.
    # 그래서 트랜잭션/영속성 컨텍스트 내부 디버그 로그는 줄이고,
    # Hibernate가 실행하는 SQL만 보이도록 최소 설정으로 맞춘다.
    org.springframework.orm.jpa: warn
    org.springframework.test.context.transaction: warn
    org.hibernate.SQL: debug
    # 바인딩 값까지 보고 싶을 때만 아래 주석을 잠깐 해제한다.
    # org.hibernate.orm.jdbc.bind: trace

study:
  seed:
    # 로컬 학습 실행 시 /members 에서 바로 데이터를 보려고 초기 멤버 100건을 넣는다.
    enabled: true
